# Load Balancer — distribui requisições entre as réplicas de
# auth-service e message-service criadas via `docker-compose up --scale`.
#
# Por que resolver dinâmico em vez de um bloco `upstream` fixo?
# Com `--scale serviço=N`, o Docker Compose cria N containers sob o MESMO
# nome de serviço e o DNS interno do Docker (127.0.0.11) já faz round-robin
# entre os IPs das réplicas. Um `upstream { server auth-service:3001; }`
# tradicional resolveria o nome só uma vez (no startup do Nginx) e fixaria
# nele, então não acompanharia novas réplicas nem faria balanceamento real
# entre elas. Usar `resolver` + variável no `proxy_pass` força o Nginx a
# resolver de novo a cada requisição, obtendo um IP de réplica diferente
# por round-robin do próprio DNS do Docker.
#
# IMPORTANTE sobre `proxy_pass` com variável: quando o destino do proxy_pass
# contém uma variável (como $auth_upstream), o Nginx NÃO faz a substituição
# automática de prefixo que faria com uma URL literal — ele não "completa"
# o restante do path sozinho. Por isso usamos $request_uri explicitamente
# (a URI original completa, ex: "/auth/register") em vez de tentar repetir
# o prefixo manualmente (ex: "$auth_upstream/auth/", que truncaria tudo
# após "/auth/" e quebraria toda rota com algo depois do prefixo).

resolver 127.0.0.11 valid=5s;

server {
    listen 8080;

    # ---- Auth Service (balanceado entre N réplicas) ----
    set $auth_upstream http://auth-service:3001;
    location /auth/ {
        proxy_pass $auth_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health-auth {
        set $auth_health http://auth-service:3001;
        proxy_pass $auth_health/health;
    }

    # ---- Message Service (balanceado entre N réplicas) ----
    set $msg_upstream http://message-service:3002;
    location /api/ {
        proxy_pass $msg_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health-msg {
        set $msg_health http://message-service:3002;
        proxy_pass $msg_health/health;
    }

    # ---- WebSocket (Socket.IO) ----
    # Qualquer réplica do message-service pode atender qualquer cliente,
    # pois o estado de salas/usuários online é compartilhado via Redis
    # (@socket.io/redis-adapter) — não é necessário sticky session aqui.
    location /socket.io/ {
        set $ws_upstream http://message-service:3002;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location = /health {
        return 200 '{"service":"nginx-lb","status":"healthy"}';
        add_header Content-Type application/json;
    }
}