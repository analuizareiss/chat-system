resolver 127.0.0.11 valid=5s;

server {
    listen 80;

    # Todo tráfego de API/WS passa pelo load balancer (nginx-lb), que
    # distribui entre as réplicas de auth-service e message-service.
    # O frontend nunca conhece o nome de um container de serviço específico.
    #
    # `resolver` + variável no proxy_pass (em vez de hostname literal) evita
    # que o nginx do frontend falhe ao iniciar caso o nginx-lb ainda não
    # esteja resolvível no exato instante do startup, além de seguir o
    # mesmo padrão de resolução dinâmica usado no nginx-lb.
    #
    # IMPORTANTE: com variável no proxy_pass, o Nginx não completa o resto
    # do path automaticamente — por isso usamos $request_uri (URI original
    # completa) em vez de repetir o prefixo manualmente. Repetir o prefixo
    # (ex: "$lb_upstream/auth/") truncaria qualquer coisa depois dele,
    # como "/auth/register" virando só "/auth/".
    set $lb_upstream http://nginx-lb:8080;

    location /auth/ {
        proxy_pass $lb_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass $lb_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass $lb_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}